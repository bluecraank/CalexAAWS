services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-app
    restart: unless-stopped
    working_dir: /var/www/html
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - node_modules:/var/www/html/node_modules
      - storage_public:/var/www/html/storage/app/public
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - laravel

  scheduler:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: laravel-scheduler
    restart: unless-stopped
    working_dir: /var/www/html
    command: php artisan schedule:work
    environment:
      SKIP_ASSETS: "true"
    volumes:
      - ./:/var/www/html
      - vendor:/var/www/html/vendor
      - storage_public:/var/www/html/storage/app/public
    depends_on:
      mariadb:
        condition: service_healthy
    networks:
      - laravel

  nginx:
    image: nginx:alpine
    container_name: laravel-nginx
    restart: unless-stopped
    ports:
      - "8080:80"
    volumes:
      - ./:/var/www/html:ro
      - vendor:/var/www/html/vendor:ro
      - storage_public:/var/www/html/storage/app/public:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - app
    networks:
      - laravel

  mariadb:
    image: mariadb:11.4
    container_name: laravel-mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: root-secret
      MARIADB_DATABASE: laravel
      MARIADB_USER: laravel
      MARIADB_PASSWORD: laravel-secret
    ports:
      - "3306:3306"
    volumes:
      - mariadb-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    networks:
      - laravel

volumes:
  mariadb-data:
  vendor:
  node_modules:
  storage_public:

networks:
  laravel:
    driver: bridge
